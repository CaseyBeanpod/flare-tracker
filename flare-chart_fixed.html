  <script>
  try { (function(){
    var CLIENT_ID='958803210621-m5h459amisa0bhha7d05150jjbudjbf5.apps.googleusercontent.com';
    var SCOPES='https://www.googleapis.com/auth/drive';
    var FILE_NAME='flare-chart-data.json';
    var LS_FID='__fc_drive_file_id', LS_SYN='__fc_drive_last_sync';
    var SKIP=[LS_FID,LS_SYN];
    var ds={token:null,fileId:localStorage.getItem(LS_FID)||null,timer:null,syncing:false,lastSync:localStorage.getItem(LS_SYN)||null,tc:null};

    var _set=Storage.prototype.setItem, _rem=Storage.prototype.removeItem;
    Storage.prototype.setItem=function(k,v){_set.call(this,k,v);if(this===localStorage&&SKIP.indexOf(k)<0)sched();};
    Storage.prototype.removeItem=function(k){_rem.call(this,k);if(this===localStorage)sched();};

    function ui(){
      var dot=document.getElementById('__fc_dot'),lbl=document.getElementById('__fc_label'),
          sta=document.getElementById('__fc_status'),act=document.getElementById('__fc_actions');
      if(!dot)return;
      if(ds.syncing){
        dot.style.background='#f0c040';
        lbl.innerHTML='<span style="display:inline-block;animation:fc-spin .8s linear infinite">&#8635;</span>&thinsp;Syncing&hellip;';
      } else if(ds.token&&ds.fileId){
        dot.style.background='#74c589'; lbl.textContent='Drive';
        sta.innerHTML=ds.lastSync?'Last sync: '+new Date(ds.lastSync).toLocaleTimeString():'Connected.';
        act.innerHTML='<button data-fc="now" style="width:100%;padding:7px 0;margin-bottom:6px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#74c589;color:#0d1a0f;">Sync Now</button>'
          +'<button data-fc="dis" style="width:100%;padding:7px 0;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#2c3528;color:#aebba4;">Disconnect</button>';
      } else {
        dot.style.background='#555'; lbl.textContent='Drive';
        sta.innerHTML=ds.fileId?'Reconnecting&hellip;':'Connect to back up &amp; sync your data.';
        act.innerHTML='<button data-fc="con" style="width:100%;padding:7px 0;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#74c589;color:#0d1a0f;">Connect Google Drive</button>';
      }
    }
    function tog(){var p=document.getElementById('__fc_panel');if(p)p.style.display=p.style.display==='block'?'none':'block';}
    function initTC(silent){
      if(!window.google||!window.google.accounts){setTimeout(function(){initTC(silent);},500);return;}
      if(ds.tc){ds.tc.requestAccessToken({prompt:silent?'':'consent'});return;}
      ds.tc=window.google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:onTok});
      ds.tc.requestAccessToken({prompt:silent?'':'consent'});
    }
    function onTok(r){if(r.error){ui();return;}ds.token=r.access_token;if(!ds.fileId)findOrCreate();else load();ui();}
    function dis(){if(ds.token&&window.google)window.google.accounts.oauth2.revoke(ds.token);ds.token=null;ds.fileId=null;localStorage.removeItem(LS_FID);var p=document.getElementById('__fc_panel');if(p)p.style.display='none';ui();}
    function req(m,u,b,ct){return fetch(u,{method:m,headers:Object.assign({Authorization:'Bearer '+ds.token},ct?{'Content-Type':ct}:{}),body:b||undefined}).then(function(r){return r.ok?r.json():Promise.reject(r.status);});}
    function med(id){return fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+ds.token}}).then(function(r){return r.ok?r.json():Promise.reject(r.status);});}
    function findOrCreate(){req('GET',"https://www.googleapis.com/drive/v3/files?q=name='"+FILE_NAME+"'+and+trashed=false&spaces=drive&fields=files(id,name)").then(function(d){if(d.files&&d.files.length){ds.fileId=d.files[0].id;_set.call(localStorage,LS_FID,ds.fileId);load();}else create();}).catch(function(){ui();});}
    function create(){fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+ds.token,'Content-Type':'multipart/related; boundary=fc_b'},body:mp(JSON.stringify({name:FILE_NAME,mimeType:'application/json'}),snap())}).then(function(r){return r.json();}).then(function(f){ds.fileId=f.id;_set.call(localStorage,LS_FID,ds.fileId);mark();syn(false);ui();}).catch(function(){syn(false);ui();});}
    function load(){if(!ds.token||!ds.fileId)return;syn(true);med(ds.fileId).then(function(d){if(d&&d.localStorage){var n=0;Object.keys(d.localStorage).forEach(function(k){if(SKIP.indexOf(k)<0){_set.call(localStorage,k,d.localStorage[k]);n++;}});mark();syn(false);ui();if(n>0)setTimeout(function(){location.reload();},800);}else{syn(false);save(false);}}).catch(function(){syn(false);ui();});}
    function sched(){if(!ds.token||!ds.fileId)return;if(ds.timer)clearTimeout(ds.timer);ds.timer=setTimeout(function(){save(false);},3000);}
    function save(manual){if(!ds.token||!ds.fileId)return;if(ds.syncing&&!manual)return;syn(true);fetch('https://www.googleapis.com/upload/drive/v3/files/'+ds.fileId+'?uploadType=multipart',{method:'PATCH',headers:{Authorization:'Bearer '+ds.token,'Content-Type':'multipart/related; boundary=fc_b'},body:mp(JSON.stringify({name:FILE_NAME}),snap())}).then(function(){mark();syn(false);ui();}).catch(function(){syn(false);ui();});}
    function snap(){var s={};for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(SKIP.indexOf(k)<0)s[k]=localStorage.getItem(k);}return JSON.stringify({version:1,saved:new Date().toISOString(),localStorage:s});}
    function mp(meta,body){return '--fc_b\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+meta+'\r\n--fc_b\r\nContent-Type: application/json\r\n\r\n'+body+'\r\n--fc_b--';}
    function mark(){ds.lastSync=new Date().toISOString();_set.call(localStorage,LS_SYN,ds.lastSync);}
    function syn(v){ds.syncing=v;ui();}

    // Wire the overlay buttons — called whenever the button appears in the DOM
    function wire(){
      var btn=document.getElementById('__fc_btn');
      if(!btn||btn._fcw)return;
      btn.addEventListener('click',tog);
      btn._fcw=true;
      var act=document.getElementById('__fc_actions');
      if(act&&!act._fcw){
        act.addEventListener('click',function(e){
          var fc=(e.target||{}).getAttribute&&e.target.getAttribute('data-fc');
          if(fc==='con')initTC(false);
          else if(fc==='now'){var p=document.getElementById('__fc_panel');if(p)p.style.display='none';save(true);}
          else if(fc==='dis')dis();
        });
        act._fcw=true;
      }
      ui();
      if(ds.fileId)initTC(true);
    }

    // MutationObserver watches document — survives document.documentElement.replaceWith()
    var _obs=new MutationObserver(function(){wire();});
    _obs.observe(document,{childList:true,subtree:true});
    // Also try immediately in case DOM is already ready
    wire();
  })(); } catch(e){ console.error('[fc-drive]',e); }
  </script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:{{ sevColor }};margin-top:4px;\">{{ sevWord }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12.5px;color:var(--muted);line-height:1.5;text-align:center;margin-top:12px;\">Drag or tap the ring \u00b7 joint pain &amp; swelling<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:var(--surface2);border:1px solid var(--line);border-radius:var(--radius);padding:22px;display:flex;flex-direction:column;align-items:center;\">\n                    <div style=\"font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:12px;\">Rash severity<\u002Fdiv>\n                    <div style=\"position:relative;width:200px;height:200px;flex:none;touch-action:none;\">\n                      <svg viewBox=\"0 0 220 220\" style=\"width:100%;height:100%;cursor:pointer;user-select:none;\" onmousedown=\"{{ onRashDown }}\">\n                        <sc-for list=\"{{ rashGradientSegs }}\" as=\"seg\" hint-placeholder-count=\"0\">\n                          <path d=\"{{ seg.d }}\" fill=\"none\" stroke=\"{{ seg.color }}\" stroke-width=\"16\" stroke-linecap=\"butt\" opacity=\"0.28\"><\u002Fpath>\n                        <\u002Fsc-for>\n                        <path d=\"{{ rashDialValuePath }}\" fill=\"none\" stroke=\"{{ rashSevColor }}\" stroke-width=\"16\" stroke-linecap=\"round\" style=\"transition:stroke .2s;\"><\u002Fpath>\n                        <circle cx=\"{{ rashDialKnobX }}\" cy=\"{{ rashDialKnobY }}\" r=\"13\" fill=\"#fff\" stroke=\"{{ rashSevColor }}\" stroke-width=\"4\"><\u002Fcircle>\n                      <\u002Fsvg>\n                      <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;\">\n                        <div style=\"font-family:var(--fd);font-size:54px;font-weight:600;line-height:.9;color:{{ rashSevColor }};transition:color .2s;\">{{ rashSevValue }}<\u002Fdiv>\n                        <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:{{ rashSevColor }};margin-top:4px;\">{{ rashSevWord }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"position:relative;width:100%;margin-top:10px;\">\n                      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;padding:0 4px;\">\n                        <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:left;line-height:1.3;\">Onset<\u002Fspan>\n                        <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:center;line-height:1.3;\">Full-blown<\u002Fspan>\n                        <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);text-align:right;line-height:1.3;\">Cessation<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"font-size:11.5px;color:var(--muted);text-align:center;margin-top:6px;line-height:1.4;\">Drag left \u2192 through peak \u2192 right as the episode progresses<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"margin-bottom:22px;\">\n                  <label style=\"display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:12px;\">Affected joints \u2014 tap the figure<\u002Flabel>\n                  <div style=\"display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;\">\n                    <div style=\"flex:none;background:var(--surface2);border:1px solid var(--line);border-radius:var(--radius);padding:14px 24px;\">\n                      <svg vie 2715<\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"margin-bottom:22px;\">\n                  <label style=\"display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:9px;\">Migraine today?<\u002Flabel>\n                  <div style=\"display:flex;align-items:center;gap:14px;\">\n                    <button onclick=\"{{ onMigraineToggle }}\" aria-label=\"Toggle migraine\" style=\"{{ migraineToggleStyle }}\"><span style=\"{{ migraineKnob }}\"><\u002Fspan><\u002Fbutton>\n                    <span style=\"font-size:15px;font-weight:600;color:var(--ink);\">{{ migraineDid }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div>\n                  <label style=\"display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:9px;\">Additional notes<\u002Flabel>\n                  <textarea oninput=\"{{ onSymptomNotes }}\" placeholder=\"anything else worth remembering\u2026\" style=\"width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink);font-size:15px;font-family:var(--fb);outline:none;resize:vertical;min-height:72px;line-height:1.5;\" value=\"{{ symptomNotes }}\" style-focus=\"border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);\"><\u002Ftextarea>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ isWeather }}\" hint-placeholder-val=\"{{ false }}\">\n              <div>\n                <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:20px;flex-wrap:wrap;\">\n                  <button onclick=\"{{ onFetchWeather }}\" disabled=\"{{ weatherFetching }}\" style=\"font-family:var(--fb);font-weight:600;font-size:14px;padding:11px 18px;border-radius:var(--radiu x;color:var(--ink);margin-bottom:8px;\">Nothing to chart yet<\u002Fdiv>\n              <div style=\"font-size:14px;\">Log a few days first, then patterns appear here.<\u002Fdiv>\n              <button onclick=\"{{ onLoadSample }}\" style=\"margin-top:20px;font-family:var(--fb);font-weight:600;font-size:14px;padding:12px 22px;border-radius:var(--radius-sm);border:1px solid var(--primary);background:var(--primary);color:#fff;cursor:pointer;\" style-hover=\"transform:translateY(-2px);\">Load sample data<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ hasCharts }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"display:flex;gap:11px;flex-wrap:wrap;margin-bottom:30px;\">\n                <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"5\">\n                  <div style=\"flex:1;min-width:118px;background:var(--surface2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px 18px;\">\n                    <div style=\"font-family:var(--fd);font-size:28px;font-weight:600;color:{{ s.color }};\">{{ s.value }}<\u002Fdiv>\n                    <div style=\"font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;\">{{ s.label }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n\n              <div style=\"margin-bottom:30px;\">\n                <h3 style=\"font-family:var(--fd);font-size:20px;font-weight:600;margin:0 0 3px;color:var(--ink);\">Joint &amp; rash severity over time<\u002Fh3>\n                <p style=\"font-size:13px;color:var(--muted);margin:0 0 14px;\">Daily severity, 0 (none) to 10 (extreme). Rash shown dashed.<\u002Fp>\n                <div style=\"position:relative;height:270px;\"><canvas ref=\"{{ refSeverity }}\"><\u002Fcanvas><\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"margin-bottom:30px;\">\n                <h3 style=\"font-family:var(--fd);font-size:20px;font-weight:600;margin:0 0 3px;color:var(--ink);\">Where it hurts<\u002Fh3>\n                <p style=\"font-size:13px;color:var(--muted);margin:0 0 14px;\">Heatmap of how often each joint flared. Warmer = more frequent.<\u002Fp>\n                <div style=\"display:flex;gap:26px;flex-wrap:wrap;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--line);border-radius:var(--radius);padding:22px;\">\n                  <svg viewBox=\"0 0 240 440\" style=\"width:168px;height:auto;display:block;overflow:visible;\">\n                    <g fill=\"var(--line)\" stroke=\"none\" opacity=\"0.45\">\n                      <circle cx=\"120\" cy=\"40\" r=\"20\"><\u002Fcircle>\n                      <rect x=\"111\" y=\"58\" width=\"18\" height=\"20\" rx=\"6\"><\u002Frect>\n                      <rect x=\"86\" y=\"88\" width=\"68\" height=\"124\" rx=\"20\"><\u002Frect>\n                      <rect x=\"64\" y=\"100\" width=\"17\" height=\"118\" rx=\"8.5\"><\u002Frect>\n                      <rect x=\"159\" y=\"100\" width=\"17\" height=\"118\" rx=\"8.5\"><\u002Frect>\n                      <rect x=\"98\" y=\"200\" width=\"19\" height=\"190\" rx=\"9.5\"><\u002Frect>\n                      <rect x=\"123\" y=\"200\" width=\"19\" height=\"190\" rx=\"9.5\"><\u002Frect>\n                    <\u002Fg>\n                    <sc-for list=\"{{ heatNodes }}\" as=\"n\" hint-placeholder-count=\"24\">\n                      <circle cx=\"{{ n.x }}\" cy=\"{{ n.y }}\" r=\"{{ n.r }}\" style=\"{{ n.style }}\" title=\"{{ n.title }}\"><\u002Fcircle>\n                    <\u002Fsc-for>\n                  <\u002Fsvg>\n                  <div style=\"min-width:180px;\">\n                    <div style=\"font-size:12px;color:var(--muted);font-family:var(--fm);margin-bottom:12px;\">MOST AFFECTED<\u002Fdiv>\n                    <sc-for list=\"{{ heatRanking }}\" as=\"h\" hint-placeholder-count=\"6\">\n                      <div style=\"display:
